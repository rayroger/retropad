name: Build RetroPad (external source)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout this automation repo
        uses: actions/checkout@v4

      - name: Clone RetroPad source
        shell: pwsh
        run: |
          git clone --depth 1 https://github.com/PlummersSoftwareLLC/retropad.git src
          git -C src log -1 --oneline

      # MSVC toolchain is already present on windows-latest
      - name: Build with MSVC nmake
        shell: pwsh
        run: |
          $vswhere = Join-Path ${env:ProgramFiles(x86)} 'Microsoft Visual Studio\Installer\vswhere.exe'
          if (-not (Test-Path $vswhere)) {
            Write-Error 'Could not locate vswhere.exe'
            exit 1
          }

          $vcvars = & $vswhere -latest -products * -find 'VC\Auxiliary\Build\vcvars64.bat' | Select-Object -First 1
          if (-not $vcvars) {
            Write-Error 'Could not locate vcvars64.bat via vswhere'
            exit 1
          }

          cmd /c "call ""$vcvars"" && cd src && nmake /f makefile"

      - name: Upload binaries/artifacts (optional)
        uses: actions/upload-artifact@v4
        with:
          name: retropad-build
          path: |
            src\*.exe
            src\build\**
          if-no-files-found: warn
