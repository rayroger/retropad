name: Build TinyRetroPad (from https://github.com/PlummersSoftwareLLC/TinyRetroPad )

on:
  workflow_dispatch:
  push:
  pull_request:

jobs:
  build:
    runs-on: windows-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4


      - name: Clone TinyRetroPad source
        shell: pwsh
        run: |
          git clone --depth 1 https://github.com/PlummersSoftwareLLC/TinyRetroPad.git src
          git -C src log -1 --oneline


      - name: Extract MASM32 SDK
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $zip = "${{ github.workspace }}\tools\masm.zip"
          $dest = "$env:TEMP\masm32"

          if (-not (Test-Path $zip)) {
              throw "MASM archive not found: $zip"
          }

          Expand-Archive `
              -Path $zip `
              -DestinationPath $dest `
              -Force

          # Handle masm\ folder inside archive
          if (Test-Path "$dest\masm\bin\ml.exe") {
              $dest = "$dest\masm"
          }

          if (-not (Test-Path "$dest\bin\ml.exe")) {
              Get-ChildItem $dest -Recurse -Depth 3
              throw "MASM ml.exe not found"
          }

          if (-not (Test-Path "$dest\include")) {
              throw "MASM include folder missing"
          }

          echo "MASM32=$dest" >> $env:GITHUB_ENV

          Write-Host "MASM32 root:"
          Write-Host $dest

          Write-Host "MASM executable:"
          Get-Item "$dest\bin\ml.exe"


      - name: Locate Windows SDK x86 libraries
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $sdk = Get-ChildItem `
            "C:\Program Files (x86)\Windows Kits\10\Lib" `
            -Directory |
            Sort-Object Name -Descending |
            Select-Object -First 1

          $winlib = Join-Path $sdk.FullName "um\x86"

          if (-not (Test-Path "$winlib\kernel32.lib")) {
              throw "Windows SDK x86 libraries not found"
          }

          echo "WINLIB=$winlib" >> $env:GITHUB_ENV

          Write-Host "Windows SDK library path:"
          Write-Host $winlib


      - name: Download Crinkler (optional)
        shell: pwsh
        continue-on-error: true
        run: |
          try {
              $release = Invoke-RestMethod `
                -Uri "https://api.github.com/repos/runestubbe/Crinkler/releases/latest"

              $asset = $release.assets |
                Where-Object { $_.name -like "*.zip" } |
                Select-Object -First 1

              if (-not $asset) {
                  throw "Crinkler package missing"
              }

              $zip = "$env:TEMP\crinkler.zip"
              $dir = "$env:TEMP\crinkler"

              Invoke-WebRequest `
                -Uri $asset.browser_download_url `
                -OutFile $zip

              Expand-Archive `
                -Path $zip `
                -DestinationPath $dir `
                -Force

              $exe = Get-ChildItem `
                $dir `
                -Filter "Crinkler*.exe" `
                -Recurse |
                Select-Object -First 1

              if ($exe) {
                  Copy-Item $exe.FullName C:\crinkler.exe
                  Write-Host "Crinkler installed"
              }

          }
          catch {
              Write-Warning "Crinkler not available"
          }


      - name: Assemble TinyRetroPad
        shell: cmd
        run: |
          cd src

          "%MASM32%\bin\ml.exe" ^
            /nologo ^
            /c ^
            /coff ^
            /Cp ^
            /I"%MASM32%\include" ^
            trpad.asm

          if errorlevel 1 exit /b 1


      - name: Link TinyRetroPad
        shell: cmd
        run: |
          cd src

          if exist C:\crinkler.exe (

              echo Using Crinkler

              C:\crinkler.exe ^
                trpad.obj ^
                /OUT:trpad.exe ^
                /ENTRY:MainEntry ^
                /SUBSYSTEM:WINDOWS ^
                /NOINITIALIZERS ^
                /TINYIMPORT ^
                /ORDERTRIES:2000 ^
                /LIBPATH:"%WINLIB%" ^
                kernel32.lib ^
                user32.lib ^
                shell32.lib ^
                comdlg32.lib ^
                gdi32.lib

          ) else (

              echo Using Microsoft linker

              "%LINKER%" ^
                /SUBSYSTEM:WINDOWS ^
                /ENTRY:MainEntry ^
                /OUT:trpad.exe ^
                trpad.obj ^
                /LIBPATH:"%WINLIB%" ^
                kernel32.lib ^
                user32.lib ^
                shell32.lib ^
                comdlg32.lib ^
                gdi32.lib
          )

          if errorlevel 1 exit /b 1


      - name: Verify output
        shell: cmd
        run: |
          dir src\trpad.exe


      - name: Upload executable
        uses: actions/upload-artifact@v4
        with:
          name: TinyRetroPad
          path: src\trpad.exe
          if-no-files-found: error
