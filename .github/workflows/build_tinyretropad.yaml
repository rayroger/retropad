name: Build TinyRetroPad (from https://github.com/PlummersSoftwareLLC/TinyRetroPad )

on:
  workflow_dispatch:
  push:
  pull_request:

jobs:
  build:
    runs-on: windows-latest

    steps:

      - name: Checkout automation repo
        uses: actions/checkout@v4


      - name: Clone TinyRetroPad source
        shell: pwsh
        run: |
          git clone --depth 1 https://github.com/PlummersSoftwareLLC/TinyRetroPad.git src
          git -C src log -1 --oneline


      - name: Extract MASM32 SDK
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $zip = "${{ github.workspace }}\tools\masm.zip"
          $dest = "$env:TEMP\masm32"

          if (-not (Test-Path $zip)) {
              throw "MASM archive not found: $zip"
          }

          Expand-Archive `
              -Path $zip `
              -DestinationPath $dest `
              -Force

          # Handle possible extra folder level
          if (Test-Path "$dest\masm\bin\ml.exe") {
              $dest = "$dest\masm"
          }

          if (-not (Test-Path "$dest\bin\ml.exe")) {
              Get-ChildItem $dest -Recurse -Depth 3
              throw "MASM32 ml.exe not found"
          }

          if (-not (Test-Path "$dest\include")) {
              throw "MASM32 include directory missing"
          }

          if (-not (Test-Path "$dest\lib")) {
              throw "MASM32 lib directory missing"
          }

          echo "MASM32=$dest" >> $env:GITHUB_ENV

      - name: Verify MASM
        shell: cmd
        run: |
          "%MASM32%\bin\ml.exe" /?


      - name: Download Crinkler
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $release = Invoke-RestMethod `
            -Uri "https://api.github.com/repos/runestubbe/Crinkler/releases/latest"

          $asset = $release.assets |
              Where-Object { $_.name -like "*.zip" } |
              Select-Object -First 1

          if (-not $asset) {
              throw "Crinkler zip not found"
          }

          $zip = "$env:TEMP\crinkler.zip"
          $dir = "$env:TEMP\crinkler"

          Invoke-WebRequest `
              -Uri $asset.browser_download_url `
              -OutFile $zip

          Expand-Archive `
              -Path $zip `
              -DestinationPath $dir `
              -Force

          $exe = Get-ChildItem `
              -Path $dir `
              -Filter "Crinkler*.exe" `
              -Recurse |
              Select-Object -First 1

          if (-not $exe) {
              throw "Crinkler.exe not found"
          }

          Copy-Item $exe.FullName "C:\crinkler.exe"

          Write-Host "Crinkler installed"


      - name: Build TinyRetroPad
        shell: cmd
        run: |
          cd src

          "%MASM32%\bin\ml.exe" ^
              /nologo ^
              /c ^
              /coff ^
              /Cp ^
              /I"%MASM32%\include" ^
              trpad.asm

          C:\crinkler.exe ^
              trpad.obj ^
              /OUT:trpad.exe ^
              /ENTRY:MainEntry ^
              /SUBSYSTEM:WINDOWS ^
              /NOINITIALIZERS ^
              /TINYIMPORT ^
              /ORDERTRIES:2000 ^
              /LIBPATH:"%MASM32%\lib" ^
              kernel32.lib ^
              user32.lib ^
              shell32.lib ^
              comdlg32.lib ^
              gdi32.lib


      - name: Verify output
        shell: cmd
        run: |
          dir src\trpad.exe


      - name: Upload executable
        uses: actions/upload-artifact@v4
        with:
          name: TinyRetroPad
          path: src\trpad.exe
          if-no-files-found: error
