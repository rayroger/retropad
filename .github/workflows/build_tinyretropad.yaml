name: Build TinyRetroPad (from https://github.com/PlummersSoftwareLLC/TinyRetroPad )

on:
  workflow_dispatch:
  push:
  pull_request:

jobs:
  build:
    runs-on: windows-latest

    steps:

      - name: Checkout automation repo
        uses: actions/checkout@v4

      - name: Clone TinyRetroPad source
        shell: pwsh
        run: |
          git clone --depth 1 https://github.com/PlummersSoftwareLLC/TinyRetroPad.git src
          git -C src log -1 --oneline

      - name: Setup MSVC environment
        uses: ilammy/msvc-dev-cmd@v1

      - name: Verify MASM toolchain
        shell: cmd
        run: |
          where ml
          ml /?

      - name: Install 7-Zip
        shell: pwsh
        run: |
          choco install 7zip -y

      - name: Extract MASM32 SDK
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          $zipPath = "${{ github.workspace }}\tools\masm32v11r.zip"
          $wrapperDir = "$env:TEMP\masm32_wrapper"
          $masmDir = "$env:TEMP\masm32"

          if (-not (Test-Path $zipPath)) {
            throw "MASM32 archive not found: $zipPath"
          }

          Expand-Archive `
            -Path $zipPath `
            -DestinationPath $wrapperDir `
            -Force

          $installer = Join-Path $wrapperDir "install.exe"

          if (-not (Test-Path $installer)) {
            throw "MASM32 install.exe not found"
          }

          7z x `
            $installer `
            "-o$masmDir" `
            -y

          if (-not (Test-Path "$masmDir\include")) {
            throw "MASM32 include directory missing"
          }

          if (-not (Test-Path "$masmDir\lib")) {
            throw "MASM32 lib directory missing"
          }

          Write-Host "MASM32 extracted successfully"
          Write-Host "Include:"
          Get-ChildItem "$masmDir\include" | Select-Object -First 10

      - name: Download Crinkler
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          $release = Invoke-RestMethod `
            -Uri 'https://api.github.com/repos/runestubbe/Crinkler/releases/latest'

          $asset = $release.assets |
            Where-Object { $_.name -like '*.zip' } |
            Select-Object -First 1

          if (-not $asset) {
            throw "Crinkler ZIP not found"
          }

          $zip = "$env:TEMP\crinkler.zip"
          $dir = "$env:TEMP\crinkler"

          Invoke-WebRequest `
            -Uri $asset.browser_download_url `
            -OutFile $zip

          Expand-Archive `
            -Path $zip `
            -DestinationPath $dir `
            -Force

          $exe = Get-ChildItem `
            -Path $dir `
            -Filter "Crinkler*.exe" `
            -Recurse |
            Select-Object -First 1

          if (-not $exe) {
            throw "Crinkler.exe not found"
          }

          Copy-Item $exe.FullName C:\crinkler.exe

          Write-Host "Crinkler installed"

      - name: Build TinyRetroPad
        shell: cmd
        run: |
          cd src

          ml ^
            /nologo ^
            /c ^
            /coff ^
            /Cp ^
            /IC:\Users\runneradmin\AppData\Local\Temp\masm32\include ^
            trpad.asm

          C:\crinkler.exe ^
            trpad.obj ^
            /OUT:trpad.exe ^
            /ENTRY:MainEntry ^
            /SUBSYSTEM:WINDOWS ^
            /NOINITIALIZERS ^
            /TINYIMPORT ^
            /ORDERTRIES:2000 ^
            /LIBPATH:C:\Users\runneradmin\AppData\Local\Temp\masm32\lib ^
            kernel32.lib ^
            user32.lib ^
            shell32.lib ^
            comdlg32.lib ^
            gdi32.lib

      - name: Upload executable
        uses: actions/upload-artifact@v4
        with:
          name: TinyRetroPad
          path: src\trpad.exe
          if-no-files-found: error
